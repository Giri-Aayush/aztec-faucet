services:
  - type: web
    name: aztec-faucet
    runtime: docker
    plan: free
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      # --- L1 ---
      - key: L1_RPC_URL
        sync: false
      - key: L1_CHAIN_ID
        value: "11155111"
      - key: FAUCET_PRIVATE_KEY
        sync: false
      # --- L2 ---
      - key: AZTEC_NODE_URL
        value: https://v4-devnet-2.aztec-labs.com/
      - key: SPONSORED_FPC_ADDRESS
        value: "0x09a4df73aa47f82531a038d1d51abfc85b27665c4b7ca751e2d4fa9f19caffb2"
      # --- Faucet Settings ---
      - key: ETH_DRIP_AMOUNT
        value: "0.001"
      - key: FEE_JUICE_DRIP_AMOUNT
        value: "1000000000000000000000"
      - key: DRIP_INTERVAL_MS
        value: "86400000"
      # --- Captcha (optional) ---
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
